name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            args: ""
            rust-targets: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        if: matrix.rust-targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with targets
        if: matrix.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseName: CodingPet ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseBody: See assets to download and install CodingPet.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
