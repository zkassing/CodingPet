name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag_name=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release with auto-generated changelog
        id: create
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
        with:
          script: |
            const tag = process.env.TAG_NAME;
            // If a release for this tag already exists (re-run scenario), reuse it.
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('release_id', existing.data.id);
              core.info(`Reusing existing release ${existing.data.id} for ${tag}`);
              return;
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `CodingPet ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            core.setOutput('release_id', data.id);
            core.info(`Created draft release ${data.id} for ${tag}`);

  publish-tauri:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust-targets: aarch64-apple-darwin
          - name: macOS Intel
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust-targets: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            args: ""
            rust-targets: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""
            rust-targets: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        if: matrix.rust-targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust with targets
        if: matrix.rust-targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs: [create-release, publish-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: false,
              make_latest: 'true',
            });
            core.info(`Published release ${process.env.RELEASE_ID}`);
